  <!-- "S" before sunburst -->
  <text x="38" y="26" font-family="'Manrope','Inter',sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="end" letter-spacing="2">S</text>

  <!-- Sunburst replacing "O" -->
  <use href="#sunburst-light" x="50" y="18"/>

  <!-- "LARIS" after sunburst -->
  <text x="64" y="26" font-family="'Manrope','Inter',sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" letter-spacing="2">LARIS</text>

  <!-- "WIRELESS" below, centered -->
  <text x="120" y="44" font-family="'Manrope','Inter',sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="5">WIRELESS</text>
</svg>