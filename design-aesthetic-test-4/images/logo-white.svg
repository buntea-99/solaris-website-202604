<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50">
  <defs>
    <g id="sunburst-light">
      <g fill="#F5C200">
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(0)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(15)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(30)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(45)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(60)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(75)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(90)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(105)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(120)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(135)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(150)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(165)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(180)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(195)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(210)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(225)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(240)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(255)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(270)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(285)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(300)"/>
        <ellipse cx="0" cy="0" rx="1.2" ry="9" transform="rotate(315)"/>
